name: Release Note
permissions:
  contents: read
"on":
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA to generate release notes for
        type: string
        required: false
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ inputs.commit_sha || github.sha }}

      - name: Get version and diff
        id: info
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          SHA="${{ inputs.commit_sha || github.sha }}"
          {
            echo "diff<<EOF"
            git diff ${SHA}~1 ${SHA} -- src/
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Summarise with Claude
        id: summary
        uses: mollie/mollie-api-release-note-generator@main
        with:
          diff: ${{ steps.info.outputs.diff }}

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          SUMMARY="${{ steps.summary.outputs.release_notes }}"
          curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg version "$VERSION" \
              --arg summary "$SUMMARY" \
              --arg url "https://pypi.org/project/mollie-api-py/$VERSION/" '{
                content: ("<:python:1509111025377738832> Python **v" + $version + "** is out 🎉\n\nA shiny new version just dropped! ✨\nWhat changed? **Great question, glad you asked!**\n\n" + $summary + "\n\nCheck it out [here](" + $url + ")")
              }')"
