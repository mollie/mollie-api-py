name: Publish
permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write
"on":
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA to generate release notes for
        type: string
        required: false
jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Update package name in README
        run: |
          sed -i 's/uv add mollie$/uv add mollie-api-py/g' README.md
          sed -i 's/pip install mollie$/pip install mollie-api-py/g' README.md
          sed -i 's/poetry add mollie$/poetry add mollie-api-py/g' README.md
          sed -i 's/uvx --from mollie python/uvx --from mollie-api-py python/g' README.md

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update package name to mollie-api-py in README"
            git push
          fi

  publish:
    needs: update-readme
    uses: speakeasy-api/sdk-generation-action/.github/workflows/sdk-publish.yaml@v15
    with:
      target: client
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      pypi_token: ${{ secrets.PYPI_TOKEN }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}

  trigger-release-note:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Release Note workflow
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/sdk_release_note.yaml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"commit_sha\":\"${{ inputs.commit_sha || github.sha }}\"}}"
